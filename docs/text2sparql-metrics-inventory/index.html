ry is ran against the KB and we compare the returned answer to the answer of the gold standard.", "Used In Ref": "2 , 3 , 10 , 124 , 69 , 35 , 53 , 36 , 56 , 30 , 67 , 50 , 140 , 83 , 84 , 63 , 48 , 141 ,65 , 38 , 31 , 101 , 123 , 129", "Type": "Execution-based", "Refence article for this metric": NaN}, {"Ref": 25, "Name": "EM isomorphism", "Definition": "Exact match based on graph isomorphism", "Used In Ref": "104 ,", "Type": "Graph-based", "Refence article for this metric": NaN}, {"Ref": 26, "Name": "CodeBleu", "Definition": "a Method for Automatic Evaluation of Code Synthesi", "Used In Ref": "5, 28", "Type": "String-based", "Refence article for this metric": 107}, {"Ref": 27, "Name": "Syntax score", "Definition": "The Syntax score represents the ratio of syntactically valid and correct queries to all generated queries.", "Used In Ref": "5 , 28 , 53 , 140 , 54 , 38", "Type": "Execution-based", "Refence article for this metric": NaN}, {"Ref": 28, "Name": "URI EM", "Definition": "assess the URI exact match (URI EM) score, a metric that directly evaluates whether the set of all URIs in the predicted SPARQL query matches exactly with those in the reference query", "Used In Ref": 7, "Type": "String-based", "Refence article for this metric": 7}, {"Ref": 29, "Name": "URI Hallucination", "Definition": "which measures the per- centage of queries where at least one URI is hallu- cinated. A URI is considered hallucinated if it does not exist in the knowledge base memory.", "Used In Ref": 7, "Type": "Execution-based", "Refence article for this metric": 7}, {"Ref": 30, "Name": "sklearn.metrics.accuracy score", "Definition": "compares token by token between the predicted and the gold-standard target sequence, indicating the percentage of correctly generated tokens.", "Used In Ref": 8, "Type": "String-based", "Refence article for this metric": NaN}, {"Ref": 31, "Name": "Precision of AnswerSet", "Definition": "refers to the proportion of correct answers", "Used In Ref": "115 , 11 - 118", "Definition": "Check if all items from ref_set have equivalent items in gen_set, ignoring variable names", "Used In Ref": 118, "Type": "Execution-based", "Refence article for this metric": 118}, {"Ref": 57, "Name": "Granularity", "Definition": "employing unit test-like checks to evaluate specific aspects of the generated SPARQL queries, including syntax correctness and appropriate variable usage rather than just overall correctness. As such, we define a granularity ratio to assess the fine-grained quality of generated queries as follows: granularity = c_pass / c_all", "Used In Ref": 60, "Type": "String-based", "Refence article for this metric": 60}, {"Ref": 58, "Name": "Determinism Score", "Definition": "Calculate a determinism score based on the number of groups and iterations. A score of 1 indicates perfect consistency, while lower values reflect increasing inconsistency in the answers over iterations", "Used In Ref": 140, "Type": "Execution-based", "Refence article for this metric": 140}, {"Ref": 59, "Name": "accuracy (structural)", "Definition": "is similar to Accuracy (token), but disregards the condition value tokens (e.g., numeric values or string values). It evaluates how well the model understands the relations between columns/entities, and successfully converts NLQ to SPARQL structure", "Used In Ref": "83 , 84", "Type": "String-based", "Refence article for this metric": NaN}, {"Ref": 60, "Name": "sparqlIrisF1measure", "Definition": "is the F1-measure on the IRIs found in the modified SPARQL query.", "Used In Ref": 54, "Type": "String-based", "Refence article for this metric": 54}, {"Ref": 61, "Name": "Precision@k", "Definition": "measures how many of the top-k returned answers are correct", "Used In Ref": 37, "Type": "Execution-based", "Refence article for this metric": 37}, {"Ref": 62, "Name": "Recall@k", "Definition": "measures how many of the gold answers are retrieved within the top-k results", "Used In Ref": 37, "Type": "Execution-based", "Refence article for this metric": 37}]};

    function toArrayRefs(input) {
        if (input === undefined || input === null || input === '' || Number.isNaN(input)) {
            return [];
        }
        return String(input)
            .split(',')
            .map(x => x.trim())
            .filter(Boolean);
    }

    function safeText(value) {
        if (value === undefined || value === null || Number.isNaN(value)) {
            return '';
        }
        return String(value);
    }

    $(document).ready(function() {
        let paperRefFilterSet = null;

        $.fn.dataTable.ext.search.push(function(settings, _data, dataIndex) {
            if (settings.nTable.id !== 'table-papers') {
                return true;
            }
            const tableApi = new $.fn.dataTable.Api(settings);
            const row = tableApi.row(dataIndex).data();
            if (!row) {
                return true;
            }
            const yearFilter = $('#paperYearFilter').val();
            const venueFilter = $('#paperVenueFilter').val();

            const yearOk = !yearFilter || String(row.Year) === String(yearFilter);
            const venueOk = !venueFilter || String(row.Venue) === String(venueFilter);
            const refOk = !paperRefFilterSet || paperRefFilterSet.has(String(row.Ref));
            return yearOk && venueOk && refOk;
        });

        $.fn.dataTable.ext.search.push(function(settings, data) {
            if (settings.nTable.id !== 'table-metrics') {
                return true;
            }
            const typeFilter = $('#metricTypeFilter').val();
            const refSearch = $('#metricRefSearch').val().trim();
            const typeCell = String(data[3] || '');
            const usedInCell = String(data[4] || '');
            const typeOk = !typeFilter || typeCell === typeFilter;
            const refOk = !refSearch || usedInCell.includes(refSearch);
            return typeOk && refOk;
        });

        // Initialize Papers Table
        const papersTable = $('#table-papers').DataTable({
            data: data.Papers,
            columns: [
                { data: 'Ref', render: d => `<span class="badge badge-ref">${d}</span>` },
                { data: 'Title', className: 'fw-bold' },
                { data: 'Paper', render: d => (d === 'Link' || d === 'LInk') ? '<span class="text-muted">Link</span>' : `<a href="${d}" target="_blank" class="link-cell">View</a>` },
                { data: 'Repo', render: d => (d === 'Link' || !safeText(d)) ? '<span class="text-muted">Link</span>' : `<a href="${d}" target="_blank" class="link-cell">Repo</a>` },
                { data: 'Venue' },
                { data: 'Year' },
                { data: 'Peer Reviewed Type' }
            ],
            pageLength: 10,
            order: [[0, 'asc']]
        });

        // Initialize Metrics Table
        const metricsTable = $('#table-metrics').DataTable({
            data: data.Metrics,
            columns: [
                { data: 'Ref', render: d => `<span class="badge badge-ref">${d}</span>` },
                { data: 'Name', className: 'fw-bold text-primary' },
                { data: 'Definition', render: d => safeText(d) },
                { data: 'Type', render: d => safeText(d) },
                { data: 'Used In Ref', render: d => {
                    if (!d) return '';
                    return toArrayRefs(d)
                        .map(ref => `<span class="badge bg-light text-dark border me-1 chip-ref" data-ref="${ref}">${ref}</span>`)
                        .join('');
                }}
            ],
            pageLength: 10,
            order: [[0, 'asc']]
        });

        const years = [...new Set(data.Papers.map(p => p.Year).filter(v => v !== null && v !== undefined))].sort((a, b) => a - b);
        years.forEach(y => $('#paperYearFilter').append(`<option value="${y}">${y}</option>`));

        const venues = [...new Set(data.Papers.map(p => p.Venue).filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b)));
        venues.forEach(v => $('#paperVenueFilter').append(`<option value="${v}">${v}</option>`));

        const metricTypes = [...new Set(data.Metrics.map(m => m.Type).filter(v => v && !Number.isNaN(v)))].sort((a, b) => String(a).localeCompare(String(b)));
        metricTypes.forEach(t => $('#metricTypeFilter').append(`<option value="${t}">${t}</option>`));

        $('#paperYearFilter, #paperVenueFilter').on('change', function() {
            papersTable.draw();
        });

        $('#metricTypeFilter').on('change', function() {
            metricsTable.draw();
        });

        $('#metricRefSearch').on('input', function() {
            metricsTable.draw();
        });

        $('#clearPaperFilters').on('click', function() {
            paperRefFilterSet = null;
            $('#paperYearFilter').val('');
            $('#paperVenueFilter').val('');
            $('#refFilterHint').text('Tip: click references in Metrics table to jump here and focus matching papers.');
            $('#table-papers tbody tr').removeClass('row-focus');
            papersTable.draw();
        });

        $('#clearMetricFilters').on('click', function() {
            $('#metricTypeFilter').val('');
            $('#metricRefSearch').val('');
            metricsTable.search('').draw();
        });

        $('#table-metrics tbody').on('click', '.chip-ref', function() {
            const ref = String($(this).data('ref'));
            paperRefFilterSet = new Set([ref]);
            $('#refFilterHint').text(`Paper filter active from Metrics: Ref ${ref}.`);
            papersTable.draw();

            const papersTab = new bootstrap.Tab(document.querySelector('#papers-tab'));
            papersTab.show();

            setTimeout(function() {
                $('#table-papers tbody tr').removeClass('row-focus');
                $('#table-papers tbody tr').each(function() {
                    const rowData = papersTable.row(this).data();
                    if (rowData && String(rowData.Ref) === ref) {
                        $(this).addClass('row-focus');
                        this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            }, 120);
        });

        $('#table-metrics tbody').on('click', 'tr', function(evt) {
            if ($(evt.target).closest('.chip-ref').length) {
                return;
            }
            const rowData = metricsTable.row(this).data();
            if (!rowData) {
                return;
            }
            const refs = toArrayRefs(rowData['Used In Ref']);
            if (!refs.length) {
                return;
            }
            paperRefFilterSet = new Set(refs);
            $('#refFilterHint').text(`Paper filter active from metric "${rowData.Name}": refs ${refs.join(', ')}.`);
            papersTable.draw();

            const papersTab = new bootstrap.Tab(document.querySelector('#papers-tab'));
            papersTab.show();
        });
    });
</script>
